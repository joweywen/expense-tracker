<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>费用统计器 - 双币种版</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="container">
    <header>
      <h1>💰 费用统计管理系统 (USDT/RMB/THB)</h1>
      <div class="exchange-rate-display">
        1 USDT = <span id="currentRateUsdtThb">35.50</span> THB &nbsp;|&nbsp;
        1 RMB = <span id="currentRateRmbThb">4.90</span> THB &nbsp;|&nbsp;
        1 USDT = <span id="currentRateUsdtRmb">7.24</span> RMB
      </div>
    </header>

    <main>
      <section class="rate-section">
        <div class="rate-card">
          <h3>⚙️ 汇率设置</h3>
          <div class="rate-input-group">
            <div class="rate-item">
              <label for="exchangeRateUsdtThb">1 USDT = </label>
              <input type="number" id="exchangeRateUsdtThb" step="0.01" min="0" value="35.50">
              <span>THB</span>
            </div>
            <div class="rate-item">
              <label for="exchangeRateRmbThb">1 RMB = </label>
              <input type="number" id="exchangeRateRmbThb" step="0.01" min="0" value="4.90">
              <span>THB</span>
            </div>
            <div class="rate-item">
              <label for="exchangeRateUsdtRmb">1 USDT = </label>
              <input type="number" id="exchangeRateUsdtRmb" step="0.01" min="0" value="7.24">
              <span>RMB</span>
            </div>
            <button id="setRateBtn" class="btn-rate">设置汇率</button>
          </div>
        </div>
      </section>

      <section class="input-section">
        <h2>录入费用信息</h2>
        <form id="expenseForm">
          <div class="form-row">
            <div class="form-group">
              <label for="date">日期 *</label>
              <input type="date" id="date" required>
            </div>
            <div class="form-group">
              <label for="name">姓名 *</label>
              <input type="text" id="name" list="nameList" placeholder="请输入姓名" required>
            </div>
            <div class="form-group">
              <label for="location">位置 *</label>
              <input type="text" id="location" placeholder="请输入位置" required list="locationList">
            </div>
          </div>

          <div class="currency-input-section">
            <h3>金额输入（选择一种币种输入，其他自动计算）</h3>
            <div class="form-row">
              <div class="form-group currency-group">
                <label for="usdtAmount">
                  <input type="radio" name="inputType" value="usdt" checked> USDT 金额
                </label>
                <input type="number" id="usdtAmount" step="0.01" min="0" placeholder="0.00">
              </div>
              <div class="form-group currency-group">
                <label for="rmbAmount">
                  <input type="radio" name="inputType" value="rmb"> 人民币 (RMB) 金额
                </label>
                <input type="number" id="rmbAmount" step="0.01" min="0" placeholder="0.00" disabled>
              </div>
              <div class="form-group currency-group">
                <label for="thbAmount">
                  <input type="radio" name="inputType" value="thb"> 泰铢 (THB) 金额
                </label>
                <input type="number" id="thbAmount" step="0.01" min="0" placeholder="0.00" disabled>
              </div>
            </div>
            <div class="conversion-display">
              <span id="conversionText">请输入金额</span>
            </div>
          </div>
          <button type="submit" class="btn-primary">添加记录</button>
        </form>
      </section>

      <section class="statistics-section">
        <div class="statistics-header">
          <h2>统计与筛选</h2>
          <div class="filter-controls" style="display: flex; flex-wrap: wrap; gap: 10px; align-items: center;">
            <input type="text" id="filterName" placeholder="🔍 姓名搜索..." list="nameList" style="width: 120px;">
            <input type="text" id="filterLocation" placeholder="🔍 位置搜索..." list="locationList" style="width: 120px;">

            <span class="filter-label">📅 账期：</span>
            <input type="date" id="startDate">
            <span>至</span>
            <input type="date" id="endDate">

            <button id="filterBtn" class="btn-secondary">筛选</button>
            <button id="clearFilterBtn" class="btn-secondary">显示全部</button>
            <button id="refreshBtn" class="btn-secondary">刷新</button>
          </div>
        </div>

        <div class="overview">
          <div class="stat-card"><div class="stat-label">总记录数</div><div class="stat-value" id="totalCount">0</div></div>
          <div class="stat-card highlight-usdt"><div class="stat-label">总金额 (USDT)</div><div class="stat-value" id="totalUsdt">0.00</div></div>
          <div class="stat-card highlight-rmb"><div class="stat-label">总金额 (RMB)</div><div class="stat-value" id="totalRmb">¥0.00</div></div>
          <div class="stat-card highlight-thb"><div class="stat-label">总金额 (THB)</div><div class="stat-value" id="totalThb">฿0.00</div></div>
        </div>

        <div class="tabs-container">
          <div class="tabs-nav">
            <button class="tab-btn active" data-tab="byDate">📅 日期统计</button>
            <button class="tab-btn" data-tab="byLocation">📍 位置统计</button>
            <button class="tab-btn" data-tab="byDateLocation">📊 日期+位置</button>
            <button class="tab-btn" data-tab="allRecords">📋 所有记录</button>
            <button class="tab-btn" data-tab="tab-rank">🏆 排行榜</button>
          </div>

          <div class="tabs-content">
            <div class="tab-pane active" id="tab-byDate"><div id="dateStats" class="stat-list"></div></div>
            <div class="tab-pane" id="tab-byLocation"><div id="locationStats" class="stat-list"></div></div>
            <div class="tab-pane" id="tab-byDateLocation"><div id="dateLocationStats" class="stat-list"></div></div>
            <div class="tab-pane" id="tab-allRecords">
              <div class="table-container">
                <table id="recordsTable">
                  <thead><tr><th>日期</th><th>姓名</th><th>USDT</th><th>RMB</th><th>THB</th><th>位置</th><th>操作</th></tr></thead>
                  <tbody id="recordsBody"></tbody>
                </table>
              </div>
            </div>

            <div class="tab-pane" id="tab-rank">
              <div style="margin-bottom: 15px; display: flex; gap: 10px;">
                <button class="btn-secondary" onclick="renderRankChart('name')">姓名 TOP10</button>
                <button class="btn-secondary" onclick="renderRankChart('location')">位置 TOP10</button>
                <button class="btn-secondary" onclick="renderRankChart('amount')">金额 TOP10</button>
              </div>
              <div id="rankChartContainer" style="width: 100%; height: 450px; background: #fff; border-radius: 8px;"></div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <datalist id="nameList"></datalist>
  <datalist id="locationList"></datalist>

  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <script src="renderer.js"></script>

  <script>
    // 1. 核心联想词更新函数
    async function updateSuggestions() {
      try {
        // 调用 main.js 暴露的 getSuggestions 接口
        const { names, locations } = await window.expenseAPI.getSuggestions();

        const nameList = document.getElementById('nameList');
        const locationList = document.getElementById('locationList');

        if (nameList) {
          // 将姓名数组转为 <option> 标签
          nameList.innerHTML = names.map(name => `<option value="${name}">`).join('');
        }

        if (locationList) {
          // 将位置数组转为 <option> 标签
          locationList.innerHTML = locations.map(loc => `<option value="${loc}">`).join('');
        }
        console.log('联想词库更新成功:', names.length, '个姓名', locations.length, '个位置');
      } catch (err) {
        console.error('更新联想建议失败:', err);
      }
    }

    // 2. 强制覆盖全局删除函数 (你原有的逻辑保持不变)
    window.deleteExpense = async function (id) {
      if (!confirm('确定要删除这条记录吗？')) return;
      try {
        const success = await window.expenseAPI.deleteExpense(id);
        if (success) {
          if (typeof loadData === 'function') {
            await loadData();
          } else {
            document.getElementById('refreshBtn')?.click();
          }
          // 删除后更新一次联想词（万一删掉的是唯一的某个词）
          updateSuggestions();

          if (document.activeElement) document.activeElement.blur();
          setTimeout(() => {
            document.getElementById('name')?.focus();
          }, 100);
        }
      } catch (err) {
        console.error('删除操作失败:', err);
      }
    };

    // 3. 页面加载完成后立即获取一次联想词
    window.addEventListener('DOMContentLoaded', () => {
      updateSuggestions();

      // 如果有日期初始化逻辑也写在这里
      const nameInput = document.getElementById('name');
      if (nameInput) nameInput.focus();
    });

    // 4. 表单提交成功后再次更新联想词
    document.getElementById('expenseForm')?.addEventListener('submit', async (e) => {
      // 注意：这里建议在 renderer.js 的提交逻辑里调用 updateSuggestions
      // 如果 renderer.js 没写，就在这里补一个延迟刷新
      setTimeout(updateSuggestions, 1000);
    });
  </script>
</body>
</html>
